<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA Pulsar Ultra</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at center, #001021 0%, #000000 80%);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

/* Background stars */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:radial-gradient(white 1px, transparent 1px);
    background-size:40px 40px;
    opacity:0.2;
    animation: starsMove 60s linear infinite;
}

@keyframes starsMove{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}

/* Pulsar Container */
.pulsar{
    position:relative;
    width:180px;
    height:180px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Core */
.core{
    position:absolute;
    width:80px;
    height:80px;
    border-radius:50%;
    background: radial-gradient(circle, #ffffff 0%, #c9f6ff 40%, #00ccff 80%);
    box-shadow:
        0 0 40px #00ccff,
        0 0 80px #00e1ff,
        0 0 160px #66f2ff;
    animation: pulse 1.2s infinite ease-in-out,
               vibration 0.08s infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:5;
}

/* ISA text */
.core span{
    font-size:30px;
    letter-spacing:6px;
    font-weight:bold;
    text-shadow:0 0 20px #00eaff;
}

/* Shockwave ring */
.ring{
    position:absolute;
    width:80px;
    height:80px;
    border-radius:50%;
    border:2px solid rgba(150,240,255,0.6);
    animation: shock 1.2s infinite;
}

@keyframes shock{
    0%{
        transform:scale(1);
        opacity:1;
    }
    100%{
        transform:scale(3);
        opacity:0;
    }
}

/* Beam container */
.beams{
    position:absolute;
    width:300px;
    height:300px;
    animation: spin 2s linear infinite;
}

/* Vertical beam */
.beam{
    position:absolute;
    left:50%;
    top:0;
    transform:translateX(-50%);
    width:6px;
    height:100%;
    background: linear-gradient(to bottom,
        transparent,
        #ccfaff,
        white,
        #ccfaff,
        transparent);
    box-shadow:0 0 20px #00eaff;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* Pulse animation */
@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.15);
    }
}

/* Realistic vibration */
@keyframes vibration{
    0%{transform:translate(0,0);}
    25%{transform:translate(1px,-1px);}
    50%{transform:translate(-1px,1px);}
    75%{transform:translate(1px,1px);}
    100%{transform:translate(0,0);}
}

/* Welcome typing effect */
.welcome{
    margin-top:80px;
    font-size:20px;
    letter-spacing:3px;
    white-space:nowrap;
    overflow:hidden;
    border-right:2px solid white;
    width:0;
    animation: typing 3s steps(20) forwards 2s,
               blink 0.6s infinite;
    text-shadow:0 0 10px #00eaff;
}

@keyframes typing{
    from{width:0;}
    to{width:220px;}
}

@keyframes blink{
    50%{border-color:transparent;}
}
</style>
</head>

<body>

<div class="pulsar">
    <div class="beams">
        <div class="beam"></div>
    </div>
    <div class="ring"></div>
    <div class="core">
        <span>ISA</span>
    </div>
</div>

<div class="welcome">Welcome to ISA</div>

</body>
  </html>
